# Prometheus alerting rules for AlgoStudio
# Version: v1.0
# Date: 2026-03-26

groups:
  - name: algo_studio_alerts
    interval: 30s
    rules:
      # API alerts
      - alert: APILatencyHigh
        expr: histogram_quantile(0.95, rate(algo_studio_api_request_duration_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API latency is high"
          description: "API p95 latency is above 100ms for more than 5 minutes"

      - alert: APILatencyCritical
        expr: histogram_quantile(0.99, rate(algo_studio_api_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API latency is critically high"
          description: "API p99 latency is above 500ms"

      # SSE alerts
      - alert: SSEDisconnectionsHigh
        expr: rate(algo_studio_sse_disconnections_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High SSE disconnection rate"
          description: "SSE disconnection rate is elevated"

      # GPU alerts
      - alert: GPUUtilizationLow
        expr: avg(rate(nvidia_gpu_utilization[1m])) < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GPU utilization is low"
          description: "Average GPU utilization is below 50% for 10 minutes"

      - alert: GPUUtilizationHigh
        expr: avg(rate(nvidia_gpu_utilization[1m])) > 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU utilization is very high"
          description: "Average GPU utilization is above 95%"

      - alert: GPUMemoryHigh
        expr: (1 - nvidia_gpu_memory_free_bytes / nvidia_gpu_memory_total_bytes) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU memory usage is high"
          description: "GPU memory usage is above 90%"

      # Database alerts
      - alert: DatabaseLatencyHigh
        expr: histogram_quantile(0.99, rate(algo_studio_db_operation_duration_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database operation latency is high"
          description: "Database p99 latency is above 100ms"

      # Redis alerts
      - alert: RedisLatencyHigh
        expr: histogram_quantile(0.99, rate(algo_studio_redis_operation_duration_seconds_bucket[5m])) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis operation latency is high"
          description: "Redis p99 latency is above 10ms"

      # Task scheduling alerts
      - alert: SchedulingLatencyHigh
        expr: histogram_quantile(0.95, rate(algo_studio_task_scheduling_duration_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Task scheduling latency is high"
          description: "Scheduling p95 latency is above 100ms"

      # Node health alerts
      - alert: NodeDown
        expr: up{job="node_exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node is down"
          description: "Node {{ $labels.instance }} is not responding"

      # Training alerts
      - alert: TrainingStartupSlow
        expr: histogram_quantile(0.95, rate(algo_studio_training_startup_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Training startup is slow"
          description: "Training startup p95 latency is above 30 seconds"

      - alert: TrainingFailureRateHigh
        expr: rate(algo_studio_training_failures_total[5m]) / rate(algo_studio_training_total[5m]) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Training failure rate is high"
          description: "More than 10% of training tasks are failing"
