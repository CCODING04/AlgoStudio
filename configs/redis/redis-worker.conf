# Redis Worker Configuration - Port 6380
# Bind to all interfaces for cross-node replication

port 6380
bind 0.0.0.0
protected-mode no

# Replication
replicaof 192.168.0.126 6380
replica-read-only yes

# Persistence (disabled for worker)
save ""

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru

# Networking
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Logging
loglevel notice

# Logging
dir /tmp
