# Sentinel configuration for Worker Node - Port 26380
# DevOps Engineer - Phase 3.2 Sentinel Fix

port 26380
daemonize no
pidfile /var/run/redis-sentinel-26380.pid
logfile ""

# Master monitoring configuration
sentinel monitor mymaster 192.168.0.126 6380 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000
sentinel parallel-syncs mymaster 1

# Network configuration
bind 0.0.0.0
protected-mode no
tcp-keepalive 300

# Deny scripts execution (security)
sentinel deny-scripts-reconfig yes

# Static master definition
sentinel known-replica mymaster 192.168.0.126 6380
