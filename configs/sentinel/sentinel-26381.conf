# Sentinel configuration for AlgoStudio Redis Master
# Managed by DevOps Engineer - Phase 3.2 Round 2
# Second Sentinel instance on head node

port 26381
daemonize no
pidfile /var/run/redis-sentinel-26381.pid
logfile ""

# Master monitoring configuration
# quorum=2 means 2 Sentinels must agree for failover to start
sentinel monitor mymaster 192.168.0.126 6380 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000
sentinel parallel-syncs mymaster 1

# Sentinel identity (auto-generated on first start, do not set manually)
# sentinel runid <auto-generated>
# sentinel leader-epoch <auto-generated>

# Network configuration
bind 0.0.0.0
protected-mode no
tcp-keepalive 300

# Acks for Sentinel votes
sentinel leader-epoch mymaster 0
sentinel config-epoch mymaster 0

# Deny scripts execution (security)
sentinel deny-scripts-reconfig yes

# Notification scripts (disabled by default)
# sentinel notification-script mymaster <path-to-script>
# sentinel client-reconfig-script mymaster <path-to-script>

# Authentication (uncomment if master requires password)
# sentinel auth-pass mymaster <password>

# Static master definition (fallback)
# This ensures Sentinel can reach master even if it loses quorum
# sentinel known-replica mymaster 192.168.0.115 6380
# sentinel known-sentinel mymaster 192.168.0.126 26380 <runid>
