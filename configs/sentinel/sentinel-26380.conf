# Sentinel configuration for AlgoStudio Redis Master
# Managed by DevOps Engineer - Phase 3.2 Round 1

port 26380
daemonize yes
pidfile "/var/run/redis-sentinel-26380.pid"
logfile ""

# Master monitoring configuration
sentinel myid c0014843a79f9e8cefd780201e9dd9956f2df7d6
sentinel deny-scripts-reconfig yes
sentinel monitor mymaster 192.168.0.115 6380 2
sentinel down-after-milliseconds mymaster 5000

# Sentinel identity (auto-generated on first start, do not set manually)
# sentinel runid <auto-generated>
# sentinel leader-epoch <auto-generated>

# Network configuration
bind 0.0.0.0
protected-mode no
tcp-keepalive 300

# Acks for Sentinel votes
sentinel failover-timeout mymaster 10000
sentinel config-epoch mymaster 12

# Deny scripts execution (security)
sentinel leader-epoch mymaster 12

# Notification scripts (disabled by default)
# sentinel notification-script mymaster <path-to-script>
# sentinel client-reconfig-script mymaster <path-to-script>

# Authentication (uncomment if master requires password)
# sentinel auth-pass mymaster <password>

# Static master definition (fallback)
# This ensures Sentinel can reach master even if it loses quorum
# sentinel known-replica mymaster 192.168.0.115 6380
# sentinel known-sentinel mymaster 192.168.0.126 26381 <runid>

# Known replicas (added after drill)
sentinel known-replica mymaster 192.168.0.126 6380

# Known sentinels (Sentinel will update runid on first connect)
sentinel known-sentinel mymaster 192.168.0.126 26381 5c2c648415a5ed7a53e8c26205708de01b8f56ac

# Generated by CONFIG REWRITE
user default on nopass ~* +@all
dir "/home/admin02/Code/Dev/AlgoStudio"

sentinel known-sentinel mymaster 192.168.0.115 26380 30c395688614e4f5bf21ea660120524c94c25c7e
sentinel current-epoch 12
